<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Pages</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #26358C, #f47936, #26358C);
            color: white;
            font-family: Arial, sans-serif;
        }

        


		.image-row {
			display: flex;
			justify-content: center;
			gap: 10px;
			margin: 10px 0;
		}

		.image-item {
			text-align: center;
			padding: 10px;
		}
		.image-row img {
			width: 640px;
			height: 360px;
			border-radius: 10px;
			padding: 20px;
			
		}
       
        h1 {
            margin: 0;
            padding: 20px;
            font-size: 2em;
        }
        p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Pages Testing</h1>
    </div>


	<div class="image-row">
        <div class="image-item">
            <p><b>This is a .png image</b></p>
            <img src="VITEC.png" alt="Image 1">
        </div>
        <div class="image-item">
            <p>This is a .jpg image</p>
            <img src="frey.jpg" alt="Image 2">
        </div>
        <div class="image-item">
            <p>This is a .gif</p>
            <img src="smile.gif" alt="Image 3">
        </div>
    </div>
    <div class="image-row">
        <div class="image-item">
            <p>This is a .jpeg</p>
            <img src="goats.jpeg" alt="Image 4">
        </div>
        <div class="image-item">
            <p>This is a .svg</p>
            <img src="bbc 1.svg" alt="Image 5">
        </div>
        <div class="image-item">
            <p>This is a ?? images</p>
            <img src="splvash.png" alt="Image 6">
        </div>
    </div>

	</div>


</body>
</html>
